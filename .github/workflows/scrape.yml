name: Auto Scrape Coca-Cola Prices

on:
  schedule:
    # Paleidžiama kasdien 06:00 UTC (09:00 Lietuvos laiku)
    - cron: '0 6 * * *'
  workflow_dispatch: # Leidžia paleisti ir rankiniu būdu per GitHub sąsają

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deals.json
          git commit -m "Auto update deals.json" || exit 0
          git push
